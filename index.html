<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliz Día de la Madre</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f8efe4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Georgia, "Times New Roman", serif;
    }

    .contenedor {
      position: relative;
      width: min(100vw, 430px);
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      background: #f8efe4;
    }

    .tarjeta {
      width: 100%;
      display: block;
    }

    /* Imagen del regalo: empieza invisible y se revela al sacudir */
    .regalo {
      position: absolute;
      top: 17.7%;
      left: 49.3%;
      width: 45.3%;
      height: 55.2%;
      object-fit: cover;
      object-position: center;
      border-radius: 12px;
      opacity: 0;
      filter: blur(26px);
      transform: scale(0.96);
      transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
      z-index: 3;
    }

    .regalo.visible {
      opacity: 1;
      filter: blur(0px);
      transform: scale(1);
    }

    .velo {
      position: absolute;
      top: 17.7%;
      left: 49.3%;
      width: 45.3%;
      height: 55.2%;
      border-radius: 12px;
      background: rgba(210, 190, 165, 0.38);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 4;
      transition: opacity 1s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
      text-align: center;
      color: #7b5c35;
      font-weight: bold;
      font-size: 18px;
      line-height: 1.25;
    }

    .velo.oculto {
      opacity: 0;
      pointer-events: none;
    }

    .panel {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: 86%;
      z-index: 10;
      text-align: center;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      background: #b98950;
      color: white;
      font-size: 15px;
      font-weight: bold;
      box-shadow: 0 4px 14px rgba(0,0,0,0.22);
      cursor: pointer;
      margin: 4px;
    }

    .secundario {
      background: rgba(255, 255, 255, 0.92);
      color: #8a6337;
      border: 1px solid #caa977;
    }

    .estado {
      margin-top: 8px;
      color: #6d4d2f;
      font-size: 13px;
      background: rgba(255,255,255,0.76);
      padding: 7px 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .oculto {
      display: none;
    }
  </style>
</head>

<body>
  <main class="contenedor">
    <img src="./tarjeta-madre.png" alt="Tarjeta Día de la Madre" class="tarjeta">

    <img src="./regalo-kany.png" alt="Regalo especial" class="regalo" id="regalo">

    <div class="velo" id="velo">
      Sacude el celular<br>para descubrir<br>tu regalo
    </div>

    <div class="panel" id="panel">
      <button id="activar" onclick="activarMovimiento()">Tocar aquí y luego sacudir</button>
      <button class="secundario" onclick="revelarRegalo()">Revelar manualmente</button>
      <div class="estado" id="estado">Abre este link desde el celular.</div>
    </div>
  </main>

  <script>
    let revelado = false;
    let escuchando = false;
    let ultimaSacudida = 0;

    function revelarRegalo() {
      if (revelado) return;

      revelado = true;
      document.getElementById("regalo").classList.add("visible");
      document.getElementById("velo").classList.add("oculto");
      document.getElementById("estado").innerText = "Regalo revelado ❤️";

      setTimeout(function() {
        document.getElementById("panel").classList.add("oculto");
      }, 1400);
    }

    function activarMovimiento() {
      const estado = document.getElementById("estado");

      if (escuchando) {
        estado.innerText = "Ahora sacude el celular.";
        return;
      }

      if (typeof DeviceMotionEvent !== "undefined" &&
          typeof DeviceMotionEvent.requestPermission === "function") {

        DeviceMotionEvent.requestPermission()
          .then(function(permissionState) {
            if (permissionState === "granted") {
              escucharSacudida();
            } else {
              estado.innerText = "Permiso no concedido. Usa el botón revelar manualmente.";
            }
          })
          .catch(function() {
            estado.innerText = "No se pudo activar el movimiento. Usa revelar manualmente.";
          });

      } else {
        escucharSacudida();
      }
    }

    function escucharSacudida() {
      escuchando = true;
      document.getElementById("estado").innerText = "Listo. Sacude el celular para descubrirlo.";

      window.addEventListener("devicemotion", function(event) {
        if (revelado) return;

        const acc = event.accelerationIncludingGravity;
        if (!acc) return;

        const fuerza = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
        const ahora = Date.now();

        if (fuerza > 32 && ahora - ultimaSacudida > 700) {
          ultimaSacudida = ahora;
          revelarRegalo();
        }
      });
    }
  </script>
</body>
</html>
