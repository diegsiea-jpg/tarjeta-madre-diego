<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Día de la Madre</title>

  <style>
    body {
      margin: 0;
      background: #f7efe3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Georgia, serif;
    }

    .contenedor {
      position: relative;
      width: 100%;
      max-width: 430px;
    }

    .tarjeta {
      width: 100%;
      display: block;
      border-radius: 18px;
    }

    .regalo {
      position: absolute;
      top: 23%;
      left: 48%;
      width: 43%;
      height: 47%;
      object-fit: cover;
      filter: blur(22px);
      opacity: 0;
      transition: all 1.2s ease;
      border-radius: 8px;
    }

    .regalo.visible {
      filter: blur(0);
      opacity: 1;
    }

    .mensaje {
      position: absolute;
      top: 43%;
      left: 50%;
      transform: translateX(-50%);
      width: 38%;
      text-align: center;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      background: rgba(80, 60, 40, 0.55);
      padding: 14px;
      border-radius: 16px;
      backdrop-filter: blur(6px);
    }

    .mensaje.oculto {
      display: none;
    }

    .boton {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: #b88a44;
      color: white;
      border: none;
      padding: 14px 22px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    .boton.oculto {
      display: none;
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <img src="tarjeta-madre.png" class="tarjeta">

    <img src="regalo-kany.png" class="regalo" id="regalo">

    <div class="mensaje" id="mensaje">
      Sacude el celular para descubrir tu regalo
    </div>

    <button class="boton" id="boton" onclick="activarMovimiento()">
      Tocar aquí y luego sacudir
    </button>
  </div>

  <script>
    let revelado = false;

    function revelarRegalo() {
      if (!revelado) {
        document.getElementById("regalo").classList.add("visible");
        document.getElementById("mensaje").classList.add("oculto");
        document.getElementById("boton").classList.add("oculto");
        revelado = true;
      }
    }

    function activarMovimiento() {
      if (typeof DeviceMotionEvent !== "undefined" &&
          typeof DeviceMotionEvent.requestPermission === "function") {
        DeviceMotionEvent.requestPermission()
          .then(function(permissionState) {
            if (permissionState === "granted") {
              escucharSacudida();
            } else {
              alert("Debes permitir el movimiento para revelar el regalo.");
            }
          });
      } else {
        escucharSacudida();
      }
    }

    function escucharSacudida() {
      alert("Ahora sacude el celular para revelar el regalo.");

      window.addEventListener("devicemotion", function(event) {
        let acc = event.accelerationIncludingGravity;

        if (!acc) return;

        let fuerza = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);

        if (fuerza > 35) {
          revelarRegalo();
        }
      });
    }
  </script>

</body>
</html>
